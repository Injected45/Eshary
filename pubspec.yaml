name: eshary
description: شركة الرحالة — transfer & currency-buy operations app.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  flutter_riverpod: ^2.5.1
  supabase_flutter: ^2.5.6
  go_router: ^14.2.7
  intl: ^0.20.2
  share_plus: ^10.0.2
  pdf: ^3.11.1
  printing: ^5.13.2
  shared_preferences: ^2.3.2
  font_awesome_flutter: ^10.7.0
  google_sign_in: ^6.2.1
  audioplayers: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  generate: false
  assets:
    - assets/fonts/
    - assets/images/
    - assets/sounds/
  fonts:
    - family: Almarai
      fonts:
        - asset: assets/fonts/Almarai-Light.ttf
          weight: 300
        - asset: assets/fonts/Almarai-Regular.ttf
          weight: 400
        - asset: assets/fonts/Almarai-Bold.ttf
          weight: 700
        - asset: assets/fonts/Almarai-ExtraBold.ttf
          weight: 800
    - family: NotoArabic
      fonts:
        - asset: assets/fonts/NotoNaskhArabic-Regular.ttf
        - asset: assets/fonts/NotoNaskhArabic-Medium.ttf
          weight: 500
        - asset: assets/fonts/NotoNaskhArabic-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/NotoNaskhArabic-Bold.ttf
          weight: 700

flutter_launcher_icons:
  android: "ic_launcher"
  ios: false
  image_path: "app_icon.jpeg"
  min_sdk_android: 21
  adaptive_icon_background: "#020617"
  adaptive_icon_foreground: "app_icon.jpeg"
