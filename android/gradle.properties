org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=2G -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
android.enableJetifier=true
# Workaround for Kotlin incremental compiler crash when pub cache (C:\) and
# project (D:\) live on different drive roots. The relocatable classpath
# snapshot computes a relative path across roots and throws
# IllegalArgumentException. Disable that one feature; full incremental still works.
kotlin.incremental.useClasspathSnapshot=false
